<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Github Issue Tracker Project</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwindcss and daisy-ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- geist google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- style css file -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="hide min-h-screen  justify-center items-center flex">
        <section id="login-form" class="bg-[#FFFFFF] p-5  w-84 min-h-96 shadow-sm rounded-lg">
            <div class="my-auto  mt-4 items-center justify-center">
                <img class="flex mx-auto w-20 h-20 my-2" src="./assets/github-logo.png" alt="Github Logo">
                <h2 class="text-center font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] my-2 text-center text-[16px]">Sign in to manage your issues</p>
                <div class="flex flex-col space-y-1">
                    <label class="text-[#1F2937] text-[16px] font-medium">Username</label>
                    <input id="user-name" class="p-2 text-[#64748B] rounded-md border-1 border-zinc-100" type="text" placeholder="Enter Username">
                    <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
                    <label class="text-[#1F2937] text-[16px] font-medium">Password</label>
                    <input id="user-password" class="p-2 text-[#64748B] rounded-md border-1 border-zinc-100" type="password" placeholder="Enter Password">
                    <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>
                    <button id="login-btn" class="bg-blue-600 text-white my-2 p-2 rounded-md w-full">Sign In</button>
                </div>
                
                <hr class="relative z-1 border-1 border-[#E4E4E7] my-6 rounded-md">
                <h2 class="absolute z-10 bg-[#FFFFFF] px-1 border-none -mt-9 ml-33 font-semibold text-[#1F2937] ">OR</h2>
                    
               
                
                <div class="text-center space-y-1">
                    <p class="text-[#64748B] text-sm">Demo Credentials:</p>
                    <div class="bg-[#F8FAFC] p-2 rounded-md">
                        <p class="text-[#1F2937]"><span class="font-medium text-[14px]">Username:</span><span class="text-sm"> admin</span></p>
                        <p class="text-[#1F2937]"><span class="font-medium text-[14px]">Password:</span><span class="text-sm"> admin123</span></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <section id="spinner" class="hide flex mx-auto justify-center items-center">
        <span class=" loading loading-spinner loading-xl"></span>
    </section>
    <section id="all-issues" class="">
        
        <div class="flex justify-between items-center px-12 py-2 bg-[#FFFFFF] shadow-sm">
            <div class="flex justify-center items-center space-x-2">
                <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
                <h2 class="text-center font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
            </div>
            <div class="space-x-2">
                <span class="btn"><i class="fa-brands fa-sistrix"></i><input  type="text" class="border-none" placeholder="Search issues..."></span>
                
                <button class="btn btn-outline btn-primary bg-[#4A00FF] text-[#FFFFFF] font-semibold text-[16px]"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
        <div class="my-3 bg-lime-300">
            <h2>all buton</h2>
        </div>
        <div class="bg-orange-300">
            <h2>all card</h2>
        </div>
        
        
    </section>

    <script src="./script.js"></script>
</body>
</html>
